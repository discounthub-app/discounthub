<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Категории — DiscountHub</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0;background:#fafafa;color:#111}
    header{position:sticky;top:0;background:#fff;border-bottom:1px solid #eee;padding:12px 16px;font-weight:600}
    main{max-width:900px;margin:0 auto;padding:16px}
    .toolbar{display:flex;gap:8px;align-items:center;margin-bottom:12px}
    .badge{display:inline-block;padding:2px 8px;border-radius:12px;background:#f1f1f1;font-size:12px}
    ul{list-style:none;padding:0;margin:0}
    li{background:#fff;border:1px solid #eee;border-radius:12px;padding:12px 14px;margin:8px 0;display:flex;justify-content:space-between;align-items:center}
    .desc{color:#555;font-size:14px;margin-top:4px}
    .muted{color:#777}
    .error{color:#b00020;margin-top:10px}
    .footer{margin-top:24px;color:#777;font-size:13px}
    button{padding:8px 10px;border:1px solid #ddd;border-radius:10px;background:#fff;cursor:pointer}
    button:hover{background:#f6f6f6}
    a{color:#cc0000;text-decoration:none}
    a:hover{text-decoration:underline}
  </style>
</head>
<body>
  <header>DiscountHub — Категории</header>
  <main>
    <div class="toolbar">
      <span id="count" class="badge">Загрузка…</span>
      <button id="reload">Обновить</button>
      <button id="clearToken" title="Очистить токен в localStorage">Сбросить токен</button>
      <span class="muted">Токен берётся из <code>localStorage.token</code></span>
    </div>
    <div id="error" class="error" style="display:none;"></div>
    <ul id="list"></ul>
    <div class="footer">
      <div>Нет доступа? Сначала авторизуйтесь на странице <a href="./login.html">login.html</a>, затем вернитесь сюда.</div>
      <div>API: <code id="apiBase"></code></div>
    </div>
  </main>
  <script>
    const apiBase = `${location.protocol}//${location.hostname}:8000`;
    document.getElementById('apiBase').textContent = apiBase + '/categories/';

    function getToken() {
      return localStorage.getItem('token') || localStorage.getItem('authToken') || '';
    }

    async function load() {
      const list = document.getElementById('list');
      const err = document.getElementById('error');
      const count = document.getElementById('count');
      list.innerHTML = '';
      err.style.display = 'none';
      count.textContent = 'Загрузка…';

      const token = getToken();
      const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
      try {
        const res = await fetch(`${apiBase}/categories/`, { headers });
        if (res.status === 401) {
          throw new Error('401 Unauthorized — токен не найден или истёк. Зайдите на login.html и повторите.');
        }
        if (!res.ok) {
          throw new Error(`${res.status} ${res.statusText}`);
        }
        const data = await res.json();
        count.textContent = `Всего: ${data.length}`;
        if (!Array.isArray(data) || data.length === 0) {
          list.innerHTML = '<li class="muted">Категорий нет</li>';
          return;
        }
        for (const x of data) {
          const li = document.createElement('li');
          const left = document.createElement('div');
          const name = document.createElement('div');
          name.textContent = x.name || '—';
          const desc = document.createElement('div');
          desc.className = 'desc';
          desc.textContent = x.description || '';
          left.appendChild(name);
          if (x.description) left.appendChild(desc);

          const right = document.createElement('div');
          right.className = 'muted';
          right.textContent = `id: ${x.id}`;

          li.appendChild(left);
          li.appendChild(right);
          list.appendChild(li);
        }
      } catch (e) {
        err.textContent = 'Ошибка: ' + (e && e.message ? e.message : e);
        err.style.display = 'block';
        count.textContent = 'Ошибка';
      }
    }

    document.getElementById('reload').addEventListener('click', load);
    document.getElementById('clearToken').addEventListener('click', () => {
      localStorage.removeItem('token');
      localStorage.removeItem('authToken');
      alert('Токен очищен. Перезайдите через login.html');
    });

    load();
  </script>
<a href="/discount-create.html" style="position:fixed;top:56px;right:8px;z-index:99999;background:#fff;border:1px solid #eee;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.06);padding:8px 12px;text-decoration:none;color:#111">+ Скидка</a>
<script src="categories-link.js"></script>
<script src="enhance-discount-create.js"></script>
</body>
